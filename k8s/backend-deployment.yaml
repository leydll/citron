apiVersion: apps/v1
kind: Deployment
metadata:
  name: citron-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: citron-backend
  template:
    metadata:
      labels:
        app: citron-backend
    spec:
      containers:
        - name: backend
          image: mon-user-docker/mon-app-back:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: citron-config
                  key: BACKEND_PORT
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

