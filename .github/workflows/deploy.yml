name: CI / Build / Deploy

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build_test_push_deploy:
    runs-on: ubuntu-latest

    env:
      BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/citron-backend
      FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/citron-frontend 

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Deploy to VM (K3s) via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail

            if ! command -v kubectl >/dev/null 2>&1; then
              echo "kubectl introuvable sur la VM"
              exit 1
            fi

            if [ ! -f /etc/rancher/k3s/k3s.yaml ]; then
              echo "K3s kubeconfig introuvable: /etc/rancher/k3s/k3s.yaml"
              exit 1
            fi

            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            if [ ! -d citron ]; then
              git clone https://github.com/leydll/citron.git citron
            fi

            cd citron
            git fetch --all --prune
            git reset --hard origin/main

            kubectl apply -f k8s/
            kubectl rollout restart deployment/citron-backend deployment/citron-frontend
            kubectl rollout status deployment/citron-backend --timeout=120s
            kubectl rollout status deployment/citron-frontend --timeout=120s

